services:
  - type: web
    name: getdraft-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # --- Auth / token signing (REQUIRED — app boots without them but
      #     email-OTP signing + guardian-QR signing break or fail closed) ---
      - key: AUTH_VERIFICATION_SECRET
        sync: false
      - key: GUARDIAN_QR_SECRET
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # --- Stripe (REQUIRED for billing; webhook fails closed if unset) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_PREMIUM
        sync: false
      # --- Twilio (phone OTP via Verify) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      # --- Didit (KYC identity verification; webhook fails closed if unset) ---
      - key: DIDIT_API_KEY
        sync: false
      - key: DIDIT_WORKFLOW_ID
        sync: false
      - key: DIDIT_WEBHOOK_SECRET
        sync: false
      # --- Push + misc ---
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Leave EMPTY in production (OTP-bypass + account-purge allowlist).
      - key: TEST_PHONES
        sync: false
